<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Pedido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Detalhes do Pedido</h1>

        <div id="cliente" class="cliente-info"></div>

        <table id="itens">

                <tr>
                    <th>ID Produto</th>
                    <th>Nome</th>
                    <th>Quantidade</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody></tbody>

        <p id="total" class="total">Total: R$ 0,00</p>

        <button onclick="window.history.back()" class="btn-voltar">Voltar</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
